<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Lesson</title>

<link rel="stylesheet" href="styles.css">

<!-- Bootstrap for carousel -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body>

<!-- =========================================================
SPLASH PAGE
========================================================= -->

<div id="pageSplash" class="page is-active">

  <div class="splash-container">

    <!-- Background Image -->
    <div class="splash-background"></div>

    <!-- Content -->
    <div class="splash-content">

      <h1 id="lessonNumber">Lesson</h1>
      <p id="lessonSubtitle"></p>

      <button id="startBriefBtn" class="btn-start">
        Start Lesson
      </button>

    </div>

  </div>

</div>

<!-- =========================================================
LESSON PAGE
========================================================= -->

<div id="pageLesson" class="page">

  <div class="lesson-layout">

    <!-- LEFT MENU -->
    <aside class="lesson-menu">
      <ul id="lessonMenuList" class="lesson-menu-list"></ul>
    </aside>

    <!-- CONTENT -->
    <main class="lesson-content">
      <h2 id="contentHeading"></h2>
      <ul id="contentBullets" class="lesson-bullets"></ul>

      <!-- MEDIA -->
      <div id="thumbGrid" class="media-container"></div>

    </main>

  </div>

</div>


<!-- =========================================================
LIGHTBOX
========================================================= -->

<div id="lightbox" class="lightbox">

  <div class="lightbox-content">

    <button id="lightboxClose" class="lightbox-close">
      ✕
    </button>

    <div class="lightbox-image-wrap">

      <img id="lightboxImage" src="" alt="">

    </div>

    <div id="lightboxTitle" class="lightbox-title"></div>

  </div>

</div>



<!-- =========================================================
SCRIPTS
========================================================= -->

<!-- Bootstrap JS (carousel functionality) -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<!-- Lesson content -->
<script src="lesson-data.js"></script>

<!-- App logic -->
<script src="app.js"></script>

</body>
</html>
